<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>grovedb-proof-visualizer demo</title>
    <link rel="stylesheet" href="../dist/style.css" />
    <style>
      body {
        background: #0d1117;
        color: #c9d1d9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 32px;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
      }
      .controls {
        margin-bottom: 16px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      button {
        padding: 4px 10px;
        background: #21262d;
        color: #c9d1d9;
        border: 1px solid #30363d;
        border-radius: 6px;
        cursor: pointer;
        font: inherit;
      }
      button:hover { border-color: #58a6ff; }
    </style>
  </head>
  <body>
    <h1>grovedb-proof-visualizer — phase 2 fixture demo</h1>

    <div class="controls">
      <button id="toggle-theme">Toggle theme</button>
      <button id="toggle-collapsed">Collapse / expand all layers</button>
      <span style="color: #6e7681">— Fixture: <code>query1_count.json</code> (5-layer synth proof)</span>
    </div>

    <div id="root" style="max-width: 1100px"></div>

    <script type="module">
      import { renderProof } from "../dist/index.js";

      const host = document.getElementById("root");
      const handle = await renderProof(
        host,
        { format: "json", data: await fetch("query1_count.json").then((r) => r.text()) },
        { theme: "auto" },
      );

      let isLight = false;
      document.getElementById("toggle-theme").addEventListener("click", () => {
        isLight = !isLight;
        host.dataset.gpvTheme = isLight ? "light" : "navy";
        document.body.style.background = isLight ? "#ffffff" : "#0d1117";
        document.body.style.color = isLight ? "#1f2328" : "#c9d1d9";
      });

      let collapsed = false;
      document.getElementById("toggle-collapsed").addEventListener("click", () => {
        collapsed = !collapsed;
        for (const d of host.querySelectorAll("details.gpv-layer")) {
          d.open = !collapsed;
        }
      });
    </script>
  </body>
</html>
