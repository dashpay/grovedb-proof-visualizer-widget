name: Deploy playground to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Single concurrent deploy at a time, but don't cancel an in-flight production
# build (that could leave Pages in a half-deployed state).
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (with wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          # grovedb is the heavy dep; keying on Cargo.lock is enough — the
          # workspace itself is small.
          shared-key: pages

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: packages/grovedb-proof-visualizer/yarn.lock

      - name: Build site
        run: ./scripts/build-site.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5
        # Auto-enable Pages on first run (avoids needing the manual
        # "Settings → Pages → Source: GitHub Actions" toggle).
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
