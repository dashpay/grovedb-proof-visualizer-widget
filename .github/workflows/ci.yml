name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Verify wasm compiles
        run: cargo check -p grovedb-proof-view-wasm --target wasm32-unknown-unknown

  ts:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: packages/grovedb-proof-visualizer/yarn.lock
      - name: Build wasm
        run: ./scripts/build-wasm.sh
      - name: Build TS
        run: |
          cd packages/grovedb-proof-visualizer
          yarn install --frozen-lockfile
          yarn lint
          yarn build
      - name: Build full site
        run: ./scripts/build-site.sh
